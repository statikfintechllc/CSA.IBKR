<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CSA.IBKR">
  <meta name="theme-color" content="#0a0a1a">
  <meta name="color-scheme" content="dark">
  <meta name="description" content="Zero-server IBKR trading terminal with Liquid Glass UI">

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/system/SFTi.IOS/metadata/icon-192.png">

  <title>CSA.IBKR</title>

  <style>
    /* ============================================
       LIQUID GLASS DESIGN SYSTEM — Core Foundation
       ============================================ */
    
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --glass-bg: rgba(255, 255, 255, 0.06);
      --glass-border: rgba(255, 255, 255, 0.12);
      --glass-blur: 40px;
      --glass-saturation: 180%;
      --glass-radius: 20px;
      --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      --glass-highlight: rgba(255, 255, 255, 0.15);
      
      --color-bg: #0a0a1a;
      --color-surface: #12122a;
      --color-text: #e8e8f0;
      --color-text-dim: rgba(232, 232, 240, 0.6);
      --color-accent: #00d4ff;
      --color-accent-glow: rgba(0, 212, 255, 0.3);
      --color-success: #00e676;
      --color-danger: #ff1744;
      --color-warning: #ffc400;
      
      --font-system: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', system-ui, sans-serif;
      --font-mono: 'SF Mono', ui-monospace, 'Cascadia Code', monospace;
      
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--color-bg);
      color: var(--color-text);
      font-family: var(--font-system);
      -webkit-font-smoothing: antialiased;
      -webkit-text-size-adjust: 100%;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    /* Full-screen app container with safe area padding */
    #app {
      position: fixed;
      inset: 0;
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bottom);
      padding-left: var(--safe-left);
      padding-right: var(--safe-right);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Dynamic mesh background */
    #app::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse at 20% 50%, rgba(0, 50, 100, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(0, 80, 120, 0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(20, 0, 80, 0.1) 0%, transparent 50%);
      z-index: -1;
      pointer-events: none;
    }

    /* --- Liquid Glass Material --- */
    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturation));
      -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturation));
      border: 1px solid var(--glass-border);
      border-radius: var(--glass-radius);
      box-shadow: var(--glass-shadow);
      position: relative;
    }

    .glass::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 50%;
      background: linear-gradient(180deg, var(--glass-highlight) 0%, transparent 100%);
      border-radius: var(--glass-radius) var(--glass-radius) 0 0;
      pointer-events: none;
    }

    /* --- Boot Screen --- */
    #boot-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      background: var(--color-bg);
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }

    #boot-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    #boot-screen .logo {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--color-accent);
      text-shadow: 0 0 30px var(--color-accent-glow);
      margin-bottom: 1.5rem;
    }

    #boot-screen .status {
      font-size: 0.85rem;
      color: var(--color-text-dim);
      font-family: var(--font-mono);
    }

    #boot-screen .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid rgba(0, 212, 255, 0.2);
      border-top-color: var(--color-accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 1rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* --- Login UI --- */
    #login-screen {
      position: fixed;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 8888;
      padding: 2rem;
    }

    #login-screen.active {
      display: flex;
    }

    .login-card {
      width: 100%;
      max-width: 380px;
      padding: 2.5rem 2rem;
      text-align: center;
    }

    .login-card h2 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .login-card p {
      font-size: 0.85rem;
      color: var(--color-text-dim);
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.9rem 2rem;
      border: none;
      border-radius: 12px;
      font-family: var(--font-system);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-primary {
      background: var(--color-accent);
      color: #000;
      box-shadow: 0 4px 20px var(--color-accent-glow);
    }

    .btn-primary:active {
      transform: scale(0.97);
      box-shadow: 0 2px 10px var(--color-accent-glow);
    }

    .btn-glass {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      color: var(--color-text);
    }

    /* --- Main Trading Surface --- */
    #trading-surface {
      flex: 1;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }

    #trading-surface.active {
      display: flex;
    }

    /* Chart area */
    #chart-container {
      flex: 1;
      position: relative;
      min-height: 0;
    }

    /* Bottom floating panels */
    #panel-dock {
      display: flex;
      gap: 8px;
      padding: 8px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    #panel-dock::-webkit-scrollbar { display: none; }

    .dock-item {
      flex-shrink: 0;
      padding: 0.6rem 1.2rem;
      font-size: 0.8rem;
      font-weight: 500;
      white-space: nowrap;
    }

    /* Screen wake lock indicator */
    .wake-lock-indicator {
      position: fixed;
      top: calc(var(--safe-top) + 8px);
      right: calc(var(--safe-right) + 8px);
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--color-success);
      box-shadow: 0 0 6px var(--color-success);
      z-index: 100;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .wake-lock-indicator.active { opacity: 1; }
  </style>
</head>
<body>
  <!-- Boot splash screen -->
  <div id="boot-screen">
    <div class="spinner"></div>
    <div class="logo">CSA.IBKR</div>
    <div class="status" id="boot-status">Initializing...</div>
  </div>

  <!-- Login screen -->
  <div id="login-screen">
    <div class="login-card glass">
      <h2>Connect to IBKR</h2>
      <p>Sign in with your Interactive Brokers account. Your credentials are entered directly on IBKR's secure login page.</p>
      <button class="btn btn-primary" id="btn-login" onclick="startLogin()">
        Sign In with IBKR
      </button>
      <div style="margin-top: 1rem;">
        <button class="btn btn-glass" id="btn-faceid" style="display:none;" onclick="faceIdLogin()">
          🔐 Unlock with Face ID
        </button>
      </div>
    </div>
  </div>

  <!-- Main trading surface (shown after auth) -->
  <div id="app">
    <div id="trading-surface">
      <div id="chart-container">
        <!-- Charts from SFTi.CRPs will mount here -->
      </div>
      <div id="panel-dock">
        <button class="dock-item glass" data-panel="positions">Positions</button>
        <button class="dock-item glass" data-panel="orders">Orders</button>
        <button class="dock-item glass" data-panel="scanner">Scanner</button>
        <button class="dock-item glass" data-panel="fundamentals">Fundamentals</button>
        <button class="dock-item glass" data-panel="news">News</button>
      </div>
    </div>
    <div class="wake-lock-indicator" id="wake-indicator"></div>
  </div>

  <!-- ============================================
       BOOT SEQUENCE
       Replaces: java -cp ... GatewayStart --conf
       ============================================ -->
  <script type="module">
    import configLoader from './system/IBKR.CSA/engine/config-loader.js';
    import eventBus from './system/IBKR.CSA/engine/event-bus.js';
    import logger from './system/IBKR.CSA/engine/logger.js';
    import sessionManager from './system/IBKR.CSA/bridge/session-manager.js';
    import wsManager from './system/IBKR.CSA/bridge/websocket-manager.js';
    import cookieManager from './system/IBKR.CSA/bridge/cookie-manager.js';
    import authFlow from './system/IBKR.CSA/bridge/auth-flow.js';
    import vault from './system/SFTi.IOS/storage/vault.js';
    import webauthn from './system/SFTi.IOS/face/webauthn.js';

    const log = logger.child('Boot');
    const bootStatus = document.getElementById('boot-status');

    // Expose globals for UI interaction
    window.CSA = { configLoader, eventBus, logger, sessionManager, wsManager, cookieManager, authFlow, vault, webauthn };

    // ---- Boot Sequence ----

    async function boot() {
      try {
        // Step 1: Register Service Worker
        bootStatus.textContent = 'Registering Service Worker...';
        if ('serviceWorker' in navigator) {
          const reg = await navigator.serviceWorker.register('/sw.js', { scope: '/' });
          log.info('Service Worker registered:', reg.scope);
        }

        // Step 2: Load config
        bootStatus.textContent = 'Loading configuration...';
        await configLoader.load();
        log.info('Config loaded:', configLoader.get('environment'));

        // Step 3: Initialize vault
        bootStatus.textContent = 'Initializing secure vault...';
        await vault.initWithDeviceKey();
        cookieManager.setVault(vault);

        // Step 4: Check for existing session
        bootStatus.textContent = 'Checking session...';
        const hasSession = await sessionManager.init();

        if (hasSession) {
          // Step 5a: Session found — check for Face ID
          bootStatus.textContent = 'Session active — loading...';
          await enterTradingMode();
        } else {
          // Step 5b: No session — show login
          bootStatus.textContent = 'Ready';
          await showLoginScreen();
        }
      } catch (err) {
        log.error('Boot failed:', err);
        bootStatus.textContent = `Error: ${err.message}`;
      }
    }

    async function showLoginScreen() {
      document.getElementById('boot-screen').classList.add('hidden');

      // Check if Face ID passkey exists
      const hasPasskey = await webauthn.isAvailable() && await webauthn.hasPasskey();
      if (hasPasskey) {
        document.getElementById('btn-faceid').style.display = '';
      }

      document.getElementById('login-screen').classList.add('active');
    }

    async function enterTradingMode() {
      document.getElementById('boot-screen').classList.add('hidden');
      document.getElementById('login-screen').classList.remove('active');
      document.getElementById('trading-surface').classList.add('active');

      // Request screen wake lock for live charts
      try {
        if ('wakeLock' in navigator) {
          const lock = await navigator.wakeLock.request('screen');
          document.getElementById('wake-indicator').classList.add('active');
          log.info('Screen wake lock acquired');
        }
      } catch {
        log.debug('Wake lock not available');
      }

      // Connect WebSocket for live data
      try {
        await wsManager.connect();
      } catch (err) {
        log.warn('WebSocket connection failed:', err.message);
      }

      // Request persistent storage
      if (navigator.storage?.persist) {
        const persisted = await navigator.storage.persist();
        log.info(`Storage persistence: ${persisted ? 'granted' : 'denied'}`);
      }

      log.info('Trading mode active');
    }

    // ---- Auth Actions (called from UI) ----

    window.startLogin = async function() {
      try {
        document.getElementById('btn-login').disabled = true;
        document.getElementById('btn-login').textContent = 'Connecting...';

        const success = await sessionManager.authenticate();

        if (success) {
          // Offer to create passkey (Face ID)
          if (await webauthn.isAvailable() && !(await webauthn.hasPasskey())) {
            const accounts = sessionManager.accounts;
            const userId = sessionManager.accountId || 'ibkr-user';
            try {
              const assertionData = await webauthn.register(userId, `IBKR ${userId}`);
              // Re-init vault with passkey-derived key for stronger encryption
              await vault.init(assertionData);
              cookieManager.setVault(vault);
            } catch {
              log.debug('Passkey creation skipped');
            }
          }

          await enterTradingMode();
        } else {
          document.getElementById('btn-login').textContent = 'Sign In with IBKR';
          document.getElementById('btn-login').disabled = false;
        }
      } catch (err) {
        log.error('Login failed:', err.message);
        document.getElementById('btn-login').textContent = 'Sign In with IBKR';
        document.getElementById('btn-login').disabled = false;
      }
    };

    window.faceIdLogin = async function() {
      try {
        const assertionData = await webauthn.authenticate();

        // Re-init vault with passkey-derived key
        await vault.init(assertionData);
        cookieManager.setVault(vault);

        // Try resuming session
        const hasSession = await sessionManager.init();
        if (hasSession) {
          await enterTradingMode();
        } else {
          // Passkey verified but session expired — need fresh IBKR login
          window.startLogin();
        }
      } catch (err) {
        log.warn('Face ID login failed:', err.message);
      }
    };

    // ---- Event Listeners ----

    eventBus.on('session:expired', () => {
      log.warn('Session expired — showing login');
      document.getElementById('trading-surface').classList.remove('active');
      showLoginScreen();
    });

    // ---- Start Boot ----
    boot();
  </script>
</body>
</html>
