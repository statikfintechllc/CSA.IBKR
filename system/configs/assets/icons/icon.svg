<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="58%">
      <stop offset="0%" stop-color="#0f1528"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <g filter="url(#glow)">
    <!-- Up candle 1 -->
    <rect x="68"  y="268" width="44" height="106" rx="5" fill="#26a69a"/>
    <line x1="90"  y1="242" x2="90"  y2="268" stroke="#26a69a" stroke-width="5" stroke-linecap="round"/>
    <line x1="90"  y1="374" x2="90"  y2="400" stroke="#26a69a" stroke-width="5" stroke-linecap="round"/>
    <!-- Up candle 2 -->
    <rect x="148" y="204" width="44" height="90"  rx="5" fill="#26a69a"/>
    <line x1="170" y1="177" x2="170" y2="204" stroke="#26a69a" stroke-width="5" stroke-linecap="round"/>
    <line x1="170" y1="294" x2="170" y2="318" stroke="#26a69a" stroke-width="5" stroke-linecap="round"/>
    <!-- Down candle -->
    <rect x="228" y="228" width="44" height="80"  rx="5" fill="#ef5350"/>
    <line x1="250" y1="198" x2="250" y2="228" stroke="#ef5350" stroke-width="5" stroke-linecap="round"/>
    <line x1="250" y1="308" x2="250" y2="338" stroke="#ef5350" stroke-width="5" stroke-linecap="round"/>
    <!-- Up candle 3 -->
    <rect x="308" y="154" width="44" height="100" rx="5" fill="#26a69a"/>
    <line x1="330" y1="124" x2="330" y2="154" stroke="#26a69a" stroke-width="5" stroke-linecap="round"/>
    <line x1="330" y1="254" x2="330" y2="280" stroke="#26a69a" stroke-width="5" stroke-linecap="round"/>
    <!-- Up candle 4 -->
    <rect x="388" y="114" width="44" height="86"  rx="5" fill="#26a69a"/>
    <line x1="410" y1="84"  x2="410" y2="114" stroke="#26a69a" stroke-width="5" stroke-linecap="round"/>
    <line x1="410" y1="200" x2="410" y2="230" stroke="#26a69a" stroke-width="5" stroke-linecap="round"/>
    <!-- Trend line -->
    <polyline
      points="68,293 148,249 228,268 308,204 388,157 460,118"
      stroke="#00d4ff" stroke-width="6" fill="none"
      stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Wordmark -->
  <text x="256" y="471" text-anchor="middle"
    fill="#00d4ff" opacity="0.9"
    font-family="Helvetica Neue,-apple-system,sans-serif"
    font-size="70" font-weight="800" letter-spacing="8">CSA</text>
</svg>
